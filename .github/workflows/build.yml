name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Create valid PNG assets
        run: |
          convert -size 100x100 xc:orange assets/turmeric.png
          convert -size 100x100 xc:green assets/farm-logo.png
          convert -size 100x100 xc:orange assets/icon.png
          convert -size 100x100 xc:orange assets/adaptive-icon.png
          convert -size 100x100 xc:white assets/splash-icon.png
      - run: npm install
      - run: npx expo prebuild --platform android --no-install
      - run: cd android && chmod +x gradlew && ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: farm-app-apk
          path: android/app/build/outputs/apk/release/
